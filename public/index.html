<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download</title>
    <meta name="description" content="Download your loader">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Theme matched to nfaccount.com (monochrome / white accent) */
            --bg-primary: #070707;
            --bg-secondary: #0f0f0f;
            --bg-card: #171717;
            --bg-input: #121212;
            --border: rgba(255, 255, 255, 0.10);
            --border-hover: rgba(255, 255, 255, 0.24);
            --accent: #ffffff;
            --accent-glow: rgba(255, 255, 255, 0.12);
            --accent-bright: #ffffff;
            --accent-dim: #e5e5e5;
            --success: #4ade80;
            --success-dim: rgba(74, 222, 128, 0.12);
            --error: #fb7185;
            --error-dim: rgba(251, 113, 133, 0.12);
            --text-primary: #fafafa;
            --text-secondary: #b5b5b5;
            --text-muted: #7d7d7d;
            --radius: 20px;
            --radius-sm: 14px;
            --shadow: 0 24px 70px rgba(0,0,0,0.34);
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Inter', Manrope, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --display: 'Space Grotesk', 'Inter', system-ui, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font);
            background:
                radial-gradient(circle at 12% 4%, rgba(255,255,255,0.06), transparent 31rem),
                radial-gradient(circle at 88% 18%, rgba(245,245,245,0.05), transparent 29rem),
                radial-gradient(circle at 52% 82%, rgba(112,112,112,0.10), transparent 36rem),
                linear-gradient(140deg, #050505 0%, #11101a 46%, #0a0910 100%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 900px;
            height: 500px;
            background: radial-gradient(ellipse, rgba(255,255,255,0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .app {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .download-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 36px 32px;
            width: 100%;
            max-width: 440px;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .download-card:hover { border-color: var(--border-hover); }

        .download-title {
            font-family: var(--display);
            font-size: 30px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 8px;
            text-align: center;
        }

        .download-sub {
            font-size: 14px;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .form-group { margin-bottom: 16px; }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            transition: var(--transition);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .form-input::placeholder { color: var(--text-muted); }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--accent);
            color: #070707;
            width: 100%;
            margin-top: 4px;
        }
        .btn-primary:hover { background: var(--accent-dim); transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(0); }

        .btn-secondary {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            margin-top: 8px;
        }
        .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: none;
        }

        .btn.loading .spinner { display: inline-block; }
        .btn.loading .btn-text { opacity: 0.7; }

        @keyframes spin { to { transform: rotate(360deg); } }

        .output {
            margin-top: 20px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
            display: none;
        }

        .output.show { display: block; animation: slideDown 0.25s ease; }

        @keyframes slideDown {
            from { opacity: 0; max-height: 0; }
            to { opacity: 1; max-height: 600px; }
        }

        .output-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--border);
        }

        .output-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        .output-status {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .output-status.success { background: var(--success-dim); color: var(--success); }
        .output-status.error { background: var(--error-dim); color: var(--error); }

        .output-body {
            padding: 14px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            line-height: 1.7;
            color: var(--text-secondary);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .output-body::-webkit-scrollbar { width: 4px; }
        .output-body::-webkit-scrollbar-track { background: transparent; }
        .output-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            box-shadow: var(--shadow);
            animation: toastIn 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: 380px;
        }

        .toast.success { background: #0d2818; border: 1px solid rgba(34,197,94,0.3); color: var(--success); }
        .toast.error { background: #2d0a0a; border: 1px solid rgba(239,68,68,0.3); color: var(--error); }
        .toast.info { background: #1a1a1a; border: 1px solid rgba(255,255,255,0.2); color: var(--text-primary); }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }

        footer {
            text-align: center;
            padding: 24px;
            color: var(--text-muted);
            font-size: 12px;
            position: relative;
            z-index: 1;
        }

        @media (max-width: 480px) {
            .download-card { padding: 28px 20px; }
            .download-title { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <div class="app">
        <div class="download-card">
            <h1 class="download-title">Download Loader</h1>
            <p class="download-sub">Enter your activation key to download the loader. New keys are activated automatically — re-downloads are free for valid keys.</p>

            <div class="form-group">
                <label class="form-label" for="keyInput">Activation Key</label>
                <input type="text" class="form-input" id="keyInput" placeholder="Enter your key..." autocomplete="off"
                       onkeydown="if(event.key==='Enter')downloadLoader()">
            </div>

            <button class="btn btn-primary" id="downloadBtn" onclick="downloadLoader()">
                <span class="spinner"></span>
                <span class="btn-text">Download Loader</span>
            </button>

            <button class="btn btn-secondary" id="replaceBtn" onclick="requestReplacement()">
                <span class="spinner"></span>
                <span class="btn-text">NFA invalid? Get a replacement</span>
            </button>

            <div class="output" id="output">
                <div class="output-header">
                    <span class="output-title">Result</span>
                    <span class="output-status" id="outputStatus"></span>
                </div>
                <div class="output-body" id="outputBody"></div>
            </div>
        </div>
    </div>

    <footer>&copy; <span id="year"></span></footer>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        // ── Toast notifications ──
        function toast(msg, type = 'info') {
            const container = document.getElementById('toastContainer');
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            el.textContent = msg;
            container.appendChild(el);
            setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 4000);
        }

        // ── API call helper ──
        async function api(method, path, body = null, timeoutMs = 130000) {
            const headers = { 'Content-Type': 'application/json' };
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), timeoutMs);

            try {
                const opts = { method, headers, signal: controller.signal };
                if (body && ['POST', 'PUT', 'DELETE'].includes(method)) {
                    opts.body = JSON.stringify(body);
                }

                const res = await fetch(path, opts);
                clearTimeout(timer);

                let data;
                const contentType = res.headers.get('Content-Type') || '';
                if (contentType.includes('application/json')) {
                    try {
                        data = await res.json();
                    } catch (jsonErr) {
                        const text = await res.text();
                        data = { status: 'error', message: `Invalid JSON response: ${text.slice(0, 200)}` };
                    }
                } else {
                    const text = await res.text();
                    data = { status: 'error', message: text.slice(0, 200) || `HTTP Error ${res.status}: ${res.statusText}` };
                }

                return { ok: res.ok && data?.status !== 'error', status: res.status, data };
            } catch (err) {
                clearTimeout(timer);
                throw err;
            }
        }

        // ── Show response in output panel ──
        function showOutput(data, isOk) {
            const output = document.getElementById('output');
            const status = document.getElementById('outputStatus');
            const body = document.getElementById('outputBody');

            output.classList.add('show');
            status.className = `output-status ${isOk ? 'success' : 'error'}`;
            status.textContent = isOk ? 'SUCCESS' : 'ERROR';

            body.textContent = (data && typeof data.message === 'string')
                ? data.message
                : JSON.stringify(data, null, 2);
        }

        // ── EXE download helper ──
        function downloadExe(base64, filename) {
            try {
                const binary = atob(base64);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);

                const blob = new Blob([bytes], { type: 'application/octet-stream' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename || 'loader.exe';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch (err) {
                toast('Failed to decode loader: ' + err.message, 'error');
            }
        }

        // ── Does an error message mean the key isn't activated yet? ──
        function needsActivation(data) {
            const msg = (data && typeof data.message === 'string') ? data.message.toLowerCase() : '';
            return /not\s+activated|activation\s+not\s+found|no\s+activation|not\s+found/.test(msg);
        }

        // ── Shown when activation fails because the product is out of stock. ──
        var RESTOCK_MESSAGE = 'SELECTED NFA OUT OF STOCK — USE SAME KEY WHEN AVAILABLE';

        // ── Does an error after an activation attempt mean there's no stock? ──
        function isOutOfStock(data) {
            const msg = (data && typeof data.message === 'string') ? data.message.toLowerCase() : '';
            return /out\s*of\s*stock|no\s+stock|sold\s*out|restock|activation\s+not\s+found|not\s+activated|not\s+found/.test(msg);
        }

        // ── Download flow ──
        // 1. Try create_exe — the free re-download path for already-activated keys.
        // 2. If the key isn't activated yet, activate it first (this can take a
        //    couple of minutes), then download the exe it returns.
        async function downloadLoader() {
            const key = document.getElementById('keyInput').value.trim();
            if (!key) return toast('Please enter your key', 'error');

            const btn = document.getElementById('downloadBtn');
            btn.disabled = true;
            btn.classList.add('loading');

            try {
                let r = await api('POST', '/api/v1/create_exe', { activation_key: key }, 130000);

                let attemptedActivation = false;
                if (!r.ok && needsActivation(r.data)) {
                    attemptedActivation = true;
                    toast('Key not activated yet — activating now, this can take a couple of minutes…', 'info');
                    r = await api('POST', '/api/v1/activate', { activation_key: key }, 300000);
                }

                // An activation attempt that still fails to find an activation
                // means the product is out of stock — ask the user to wait.
                const outOfStock = attemptedActivation && !r.ok && isOutOfStock(r.data);

                const display = { ...r.data };
                if (outOfStock) display.message = RESTOCK_MESSAGE;
                if (display.exe_base64) display.exe_base64 = `[${display.exe_base64.length} chars — downloading...]`;
                showOutput(display, r.ok);

                if (r.ok && r.data.exe_base64) {
                    downloadExe(r.data.exe_base64, r.data.exe_filename);
                    toast('Loader downloaded successfully', 'success');
                } else if (!r.ok) {
                    toast(outOfStock ? RESTOCK_MESSAGE : (r.data.message || 'Download failed'), 'error');
                }
            } catch (err) {
                toast('Error: ' + err.message, 'error');
            }

            btn.disabled = false;
            btn.classList.remove('loading');
        }

        // ── Warranty replacement flow ──
        // Asks the API to check the activated account; within the warranty window
        // an invalid account is auto-replaced and a fresh loader is rebuilt for
        // the same key.
        async function requestReplacement() {
            const key = document.getElementById('keyInput').value.trim();
            if (!key) return toast('Please enter your key', 'error');

            const btn = document.getElementById('replaceBtn');
            btn.disabled = true;
            btn.classList.add('loading');

            try {
                const r = await api('POST', '/api/v1/check_account', { activation_key: key }, 130000);
                const result = (r.data && r.data.result) || '';

                if (r.ok && result === 'replaced') {
                    toast('Account replaced — rebuilding your loader…', 'success');
                    const exe = await api('POST', '/api/v1/create_exe', { activation_key: key }, 130000);
                    const display = { ...exe.data };
                    if (display.exe_base64) display.exe_base64 = `[${display.exe_base64.length} chars — downloading...]`;
                    showOutput(display, exe.ok);
                    if (exe.ok && exe.data.exe_base64) {
                        downloadExe(exe.data.exe_base64, exe.data.exe_filename);
                        toast('Replacement loader downloaded', 'success');
                    } else if (!exe.ok) {
                        toast(exe.data.message || 'Replacement issued but loader rebuild failed', 'error');
                    }
                } else if (r.ok && result === 'valid') {
                    showOutput(r.data, true);
                    toast('Your account is still valid — no replacement needed', 'info');
                } else {
                    // invalid / out of warranty / no visible activity, etc.
                    showOutput(r.data, false);
                    toast(r.data.message || 'No replacement available for this key', 'error');
                }
            } catch (err) {
                toast('Error: ' + err.message, 'error');
            }

            btn.disabled = false;
            btn.classList.remove('loading');
        }
    </script>
</body>
</html>
