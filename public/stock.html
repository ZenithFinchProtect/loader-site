<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock</title>
    <meta name="description" content="Live account stock">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Theme matched to nfaccount.com (monochrome / white accent) */
            --bg-primary: #070707;
            --bg-secondary: #0f0f0f;
            --bg-card: #171717;
            --bg-input: #121212;
            --border: rgba(255, 255, 255, 0.10);
            --border-hover: rgba(255, 255, 255, 0.24);
            --accent: #ffffff;
            --accent-glow: rgba(255, 255, 255, 0.12);
            --accent-bright: #ffffff;
            --accent-dim: #e5e5e5;
            --success: #4ade80;
            --success-dim: rgba(74, 222, 128, 0.12);
            --error: #fb7185;
            --error-dim: rgba(251, 113, 133, 0.12);
            --text-primary: #fafafa;
            --text-secondary: #b5b5b5;
            --text-muted: #7d7d7d;
            --radius: 20px;
            --radius-sm: 14px;
            --shadow: 0 24px 70px rgba(0,0,0,0.34);
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Inter', Manrope, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --display: 'Space Grotesk', 'Inter', system-ui, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font);
            background:
                radial-gradient(circle at 12% 4%, rgba(255,255,255,0.06), transparent 31rem),
                radial-gradient(circle at 88% 18%, rgba(245,245,245,0.05), transparent 29rem),
                radial-gradient(circle at 52% 82%, rgba(112,112,112,0.10), transparent 36rem),
                linear-gradient(140deg, #050505 0%, #11101a 46%, #0a0910 100%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 900px;
            height: 500px;
            background: radial-gradient(ellipse, rgba(255,255,255,0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .app {
            position: relative;
            z-index: 1;
            flex: 1;
            width: 100%;
            max-width: 1080px;
            margin: 0 auto;
            padding: 48px 24px 24px;
        }

        .header { text-align: center; margin-bottom: 8px; }

        .title {
            font-family: var(--display);
            font-size: 40px;
            font-weight: 700;
            letter-spacing: -1.4px;
        }

        .sub {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-top: 8px;
        }

        .meta {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin: 20px 0 32px;
            font-size: 12px;
            color: var(--text-muted);
            flex-wrap: wrap;
        }

        .meta .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
        .meta .dot.in { background: var(--success); }
        .meta .dot.out { background: var(--error); }

        .refresh-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: var(--radius-sm);
            padding: 6px 12px;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .refresh-btn:hover { border-color: var(--border-hover); color: var(--text-primary); }

        .group { margin-bottom: 32px; }

        .group-head {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .group-title {
            font-family: var(--display);
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.2px;
            text-transform: uppercase;
        }

        .group-count {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 14px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 18px 16px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .card:hover { border-color: var(--border-hover); transform: translateY(-2px); }

        .card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
        }

        .card-name {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.3;
            letter-spacing: -0.2px;
        }

        .card-price {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 3px 9px;
            white-space: nowrap;
            flex: 0 0 auto;
        }

        .status { display: flex; align-items: center; gap: 8px; }

        .indicator {
            position: relative;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            flex: 0 0 auto;
        }

        .pulsating {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            opacity: 0.6;
            animation: pulse 1.8s ease-out infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(2.6); opacity: 0; }
        }

        .label {
            font-size: 13px;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }

        .state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 14px;
        }
        .state.error { color: var(--error); }

        footer {
            text-align: center;
            padding: 24px;
            color: var(--text-muted);
            font-size: 12px;
            position: relative;
            z-index: 1;
        }

        @media (max-width: 480px) {
            .app { padding: 32px 16px 16px; }
            .title { font-size: 22px; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1 class="title">Account Stock</h1>
            <p class="sub">Live availability and pricing for every account variant we sell. Updates automatically.</p>
        </div>

        <div class="meta">
            <span><span class="dot in"></span>In stock</span>
            <span><span class="dot out"></span>Out of stock</span>
            <span id="updated"></span>
            <button class="refresh-btn" id="refreshBtn" onclick="load()">Refresh</button>
        </div>

        <div id="root"
             data-api="/api/v1/stock"
             data-refresh="60">
            <div class="state" id="loading">Loading live stock…</div>
        </div>
    </div>

    <footer>&copy; <span id="year"></span></footer>

    <script>
        // Full product catalog mirrored from nfaccount.com (name + price).
        // `key` maps a variant to a live stock key from /api/v1/stock when one
        // exists; variants without a 1:1 backend key fall back to the store's
        // listed availability (in stock). Order here is the display order.
        var CATALOG = [
            { label: 'Rust', variants: [
                { name: '0-250 Hours',          price: '$1.20', key: 'rust_0_250_hours' },
                { name: '250-500 Hours',        price: '$1.40', key: 'rust_250_500_hours' },
                { name: '500-1000 Hours',       price: '$1.60', key: 'rust_500_1000_hours' },
                { name: '1000-2000 Hours',      price: '$1.79' },
                { name: '2000-3000 Hours',      price: '$2.29' },
                { name: '3000-7000 Hours',      price: '$2.79' },
                { name: '7000+ Hours',          price: '$4.49' },
                { name: 'Inactive 5D 500 Hours',   price: '$3.99' },
                { name: 'Inactive 5D 1000 Hours',  price: '$4.49' },
                { name: 'Inactive 15D 500 Hours',  price: '$4.89' },
                { name: 'Inactive 15D 1000 Hours', price: '$5.89' },
                { name: 'Premium 500 Hours',    price: '$2.99', key: 'rust_premium_500_hours' },
                { name: 'Premium 1000 Hours',   price: '$3.89', key: 'rust_premium_1000_hours' },
                { name: 'Premium $50 INV',      price: '$3.79', key: 'rust_premium_50_inv' },
                { name: 'Premium $100 INV',     price: '$4.89', key: 'rust_premium_100_inv' }
            ]},
            { label: 'CS2', variants: [
                { name: 'Premier Ready',         price: '$1.89', key: 'cs2_premier' },
                { name: '4 Medals',              price: '$1.89', key: 'cs2_4medals' },
                { name: '10 Medals',             price: '$2.96', key: 'cs2_10medals' },
                { name: 'Premier Inactive',      price: '$2.55', key: 'cs2_premier_inactive' },
                { name: 'Premier 10K-15K ELO',   price: '$1.20' },
                { name: 'Premier 15K-20K ELO',   price: '$2.15' },
                { name: 'Premier 20K-30K ELO',   price: '$3.12' },
                { name: 'Premier 5K Last Season',  price: '$1.12', key: 'cs2_5k_last_season' },
                { name: 'Premier 10K Last Season', price: '$1.35', key: 'cs2_10k_last_season' },
                { name: 'Premier 15K Last Season', price: '$1.75', key: 'cs2_15k_last_season' },
                { name: 'Premier 20K Last Season', price: '$2.25' },
                { name: 'Knifes - Gloves',       price: '$4.59' },
                { name: '$500 INV',              price: '$2.39' },
                { name: '$1000 INV',             price: '$3.20' }
            ]},
            { label: 'DayZ', variants: [
                { name: 'Base Account',          price: '$1.20', key: 'dayz' },
                { name: '500 Hours',             price: '$1.69', key: 'dayz_500_hours' },
                { name: '1000 Hours',            price: '$2.49', key: 'dayz_1000_hours' },
                { name: 'Inactive Random Hours', price: '$1.89', key: 'dayz_inactive' }
            ]},
            { label: 'ARC', variants: [
                { name: 'Inactive 15D 0-100 Hours',   price: '$1.69', key: 'arc_inactive_15d_0_99_hours' },
                { name: 'Inactive 15D 100-200 Hours', price: '$2.24' },
                { name: 'Inactive 15D 200+ Hours',    price: '$2.89' }
            ]},
            { label: 'EFT', variants: [
                { name: 'Standard', key: 'escape_from_tarkov' }
            ]},
            { label: 'BF6', variants: [
                { name: 'Standard', key: 'battlefield_6' }
            ]}
        ];

        (function () {
            var root    = document.getElementById('root');
            var API     = root.getAttribute('data-api') || '/api/v1/stock';
            var REFRESH = parseInt(root.getAttribute('data-refresh') || '60', 10);
            var COLOR_IN  = getCssVar('--success', '#4ade80');
            var COLOR_OUT = getCssVar('--error', '#fb7185');

            document.getElementById('year').textContent = new Date().getFullYear();

            function getCssVar(name, fallback) {
                var v = getComputedStyle(document.documentElement).getPropertyValue(name);
                return (v && v.trim()) || fallback;
            }

            function esc(s) {
                return String(s).replace(/[&<>"']/g, function (c) {
                    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
                });
            }

            // Resolve a variant's live status from the API stock map.
            // Returns { inStock: bool, label: string }.
            function statusFor(variant, stock) {
                if (variant.key && Object.prototype.hasOwnProperty.call(stock, variant.key)) {
                    var count = Number(stock[variant.key]) || 0;
                    return { inStock: count > 0, label: count > 0 ? ('In Stock · ' + count) : 'Out of Stock' };
                }
                // No 1:1 backend key — mirror the store's listed availability.
                return { inStock: true, label: 'In Stock' };
            }

            function cardHtml(variant, stock) {
                var s     = statusFor(variant, stock);
                var color = s.inStock ? COLOR_IN : COLOR_OUT;
                var price = variant.price
                    ? '<span class="card-price">' + esc(variant.price) + '</span>'
                    : '';
                return ''
                    + '<div class="card">'
                    +   '<div class="card-top">'
                    +     '<div class="card-name">' + esc(variant.name) + '</div>'
                    +     price
                    +   '</div>'
                    +   '<div class="status">'
                    +     '<span class="indicator" style="background-color:' + color + '">'
                    +       '<span class="pulsating" style="background-color:' + color + '"></span>'
                    +     '</span>'
                    +     '<span class="label" style="color:' + color + '">' + esc(s.label) + '</span>'
                    +   '</div>'
                    + '</div>';
            }

            function render(stock) {
                var html = CATALOG.map(function (group) {
                    var inCount = group.variants.filter(function (v) {
                        return statusFor(v, stock).inStock;
                    }).length;
                    return ''
                        + '<section class="group">'
                        +   '<div class="group-head">'
                        +     '<span class="group-title">' + esc(group.label) + '</span>'
                        +     '<span class="group-count">' + inCount + '/' + group.variants.length + ' in stock</span>'
                        +   '</div>'
                        +   '<div class="grid">'
                        +     group.variants.map(function (v) { return cardHtml(v, stock); }).join('')
                        +   '</div>'
                        + '</section>';
                }).join('');

                root.innerHTML = html || '<div class="state">No stock to display.</div>';

                var u = document.getElementById('updated');
                if (u) u.textContent = 'Updated ' + new Date().toLocaleTimeString();
            }

            function load() {
                fetch(API, { headers: { 'Accept': 'application/json' } })
                    .then(function (r) { return r.json(); })
                    .then(function (data) { render((data && data.stock) || {}); })
                    .catch(function () {
                        // Network/API failure — still show the full catalog using
                        // the store's listed availability so the page is never blank.
                        render({});
                    });
            }

            window.load = load;
            load();
            if (REFRESH > 0) setInterval(load, REFRESH * 1000);
        })();
    </script>
</body>
</html>
