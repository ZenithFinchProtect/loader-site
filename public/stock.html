<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock</title>
    <meta name="description" content="Live account stock">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Theme matched to nfaccount.com (monochrome / white accent) */
            --bg-primary: #070707;
            --bg-secondary: #0f0f0f;
            --bg-card: #171717;
            --bg-input: #121212;
            --border: rgba(255, 255, 255, 0.10);
            --border-hover: rgba(255, 255, 255, 0.24);
            --accent: #ffffff;
            --accent-glow: rgba(255, 255, 255, 0.12);
            --accent-bright: #ffffff;
            --accent-dim: #e5e5e5;
            --success: #4ade80;
            --success-dim: rgba(74, 222, 128, 0.12);
            --error: #fb7185;
            --error-dim: rgba(251, 113, 133, 0.12);
            --text-primary: #fafafa;
            --text-secondary: #b5b5b5;
            --text-muted: #7d7d7d;
            --radius: 20px;
            --radius-sm: 14px;
            --shadow: 0 24px 70px rgba(0,0,0,0.34);
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Inter', Manrope, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --display: 'Space Grotesk', 'Inter', system-ui, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font);
            background:
                radial-gradient(circle at 12% 4%, rgba(255,255,255,0.06), transparent 31rem),
                radial-gradient(circle at 88% 18%, rgba(245,245,245,0.05), transparent 29rem),
                radial-gradient(circle at 52% 82%, rgba(112,112,112,0.10), transparent 36rem),
                linear-gradient(140deg, #050505 0%, #11101a 46%, #0a0910 100%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 900px;
            height: 500px;
            background: radial-gradient(ellipse, rgba(255,255,255,0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .app {
            position: relative;
            z-index: 1;
            flex: 1;
            width: 100%;
            max-width: 1080px;
            margin: 0 auto;
            padding: 48px 24px 24px;
        }

        .header { text-align: center; margin-bottom: 8px; }

        .title {
            font-family: var(--display);
            font-size: 40px;
            font-weight: 700;
            letter-spacing: -1.4px;
        }

        .sub {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-top: 8px;
        }

        .meta {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin: 20px 0 32px;
            font-size: 12px;
            color: var(--text-muted);
            flex-wrap: wrap;
        }

        .meta .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
        .meta .dot.in { background: var(--success); }
        .meta .dot.out { background: var(--error); }

        .refresh-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: var(--radius-sm);
            padding: 6px 12px;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .refresh-btn:hover { border-color: var(--border-hover); color: var(--text-primary); }

        .group { margin-bottom: 32px; }

        .group-head {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .group-title {
            font-family: var(--display);
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.2px;
            text-transform: uppercase;
        }

        .group-count {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 14px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 18px 16px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .card:hover { border-color: var(--border-hover); transform: translateY(-2px); }

        .card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
        }

        .card-name {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.3;
            letter-spacing: -0.2px;
        }

        .card-price {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 3px 9px;
            white-space: nowrap;
            flex: 0 0 auto;
        }

        .status { display: flex; align-items: center; gap: 8px; }

        .indicator {
            position: relative;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            flex: 0 0 auto;
        }

        .pulsating {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            opacity: 0.6;
            animation: pulse 1.8s ease-out infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(2.6); opacity: 0; }
        }

        .label {
            font-size: 13px;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }

        .state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 14px;
        }
        .state.error { color: var(--error); }

        footer {
            text-align: center;
            padding: 24px;
            color: var(--text-muted);
            font-size: 12px;
            position: relative;
            z-index: 1;
        }

        @media (max-width: 480px) {
            .app { padding: 32px 16px 16px; }
            .title { font-size: 22px; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1 class="title">Account Stock</h1>
            <p class="sub">Live availability and pricing for every account variant we sell.</p>
        </div>

        <div class="meta">
            <span><span class="dot in"></span>In stock</span>
            <span><span class="dot out"></span>Out of stock</span>
            <span id="updated"></span>
        </div>

        <div id="root"
             data-api="https://loader.nfaccount.com/api/v1/stock"
             data-refresh="0">
            <div class="state" id="loading">Loading live stock…</div>
        </div>
    </div>

    <footer>&copy; <span id="year"></span></footer>

    <script>
        // Full product catalog (name + order + grouping) as specified by the
        // store owner. `key` maps each row to a live stock key from
        // /api/v1/stock. Rows whose key the API doesn't currently return show a
        // count of 0 (Out of Stock) and will light up automatically if/when the
        // backend starts tracking that key. Order here is the display order.
        var CATALOG = [
            { label: 'CS2', variants: [
                { name: 'Prime',                    key: 'cs2_prime' },
                { name: 'Prime · 15+d offline',     key: 'cs2_prime_inactive' },
                { name: 'Premier',                  price: '$1.89', key: 'cs2_premier' },
                { name: 'Premier · 15+d offline',   price: '$2.55', key: 'cs2_premier_inactive' },
                { name: '4+ medals',                price: '$1.89', key: 'cs2_4medals' },
                { name: '4+ medals · 15+d offline', key: 'cs2_4medals_inactive' },
                { name: '10+ medals',               price: '$2.96', key: 'cs2_10medals' },
                { name: '10+ medals · 15+d offline', key: 'cs2_10medals_inactive' },
                { name: '10–15k ELO',               price: '$1.20', key: 'cs2_10_15k_elo' },
                { name: '15–20k ELO',               price: '$2.15', key: 'cs2_15_20k_elo' },
                { name: '20–30k ELO',               price: '$3.12', key: 'cs2_20_30k_elo' },
                { name: '5k+ ELO',                  price: '$1.12', key: 'cs2_5k_last_season' },
                { name: '10k+ ELO',                 price: '$1.35', key: 'cs2_10k_last_season' },
                { name: '15k+ ELO',                 price: '$1.75', key: 'cs2_15k_last_season' },
                { name: '20k+ ELO',                 price: '$2.25', key: 'cs2_20k_last_season' },
                { name: 'Knifes / Gloves',          price: '$4.59', key: 'cs2_knifes_gloves' },
                { name: 'Inventory $500+',          price: '$2.39', key: 'cs2_500_inv' },
                { name: 'Inventory $1000+',         price: '$3.20', key: 'cs2_1000_inv' }
            ]},
            { label: 'Rust', variants: [
                { name: 'Premium',                  key: 'rust_premium' },
                { name: 'Premium · 5+d offline',    key: 'rust_premium_inactive_5d' },
                { name: 'Premium · 15+d offline',   key: 'rust_premium_inactive_15d' },
                { name: 'Premium · 500+ h',         price: '$2.99', key: 'rust_premium_500_hours' },
                { name: 'Premium · 1000+ h',        price: '$3.89', key: 'rust_premium_1000_hours' },
                { name: 'Premium · inventory $50+', price: '$3.79', key: 'rust_premium_50_inv' },
                { name: 'Premium · inventory $100+', price: '$4.89', key: 'rust_premium_100_inv' },
                { name: '0-250 h',                  price: '$1.20', key: 'rust_0_250_hours' },
                { name: '250–500 h',                price: '$1.40', key: 'rust_250_500_hours' },
                { name: '500–1000 h',               price: '$1.60', key: 'rust_500_1000_hours' },
                { name: '1000–2000 h',              price: '$1.79', key: 'rust_1000_2000_hours' },
                { name: '2000–3000 h',              price: '$2.29', key: 'rust_2000_3000_hours' },
                { name: '3000–7000 h',              price: '$2.79', key: 'rust_3000_7000_hours' },
                { name: '7000+ h',                  price: '$4.49', key: 'rust_7000_plus_hours' },
                { name: '5+d offline',              key: 'rust_inactive_5d' },
                { name: '5+d offline · 500+ h',     key: 'rust_inactive_5d_500_hours' },
                { name: '5+d offline · 1000+ h',    key: 'rust_inactive_5d_1000_hours' },
                { name: '15+d offline',             key: 'rust_inactive_15d' },
                { name: '15+d offline · 500+ h',    key: 'rust_inactive_15d_500_hours' },
                { name: '15+d offline · 1000+ h',   key: 'rust_inactive_15d_1000_hours' }
            ]},
            { label: 'Arc Raiders', variants: [
                { name: '0–99 h',                   key: 'arc_0_99_hours' },
                { name: '100–200 h',                key: 'arc_100_200_hours' },
                { name: '200+ h',                   key: 'arc_200_plus_hours' },
                { name: '15+d offline · 0–99 h',    price: '$1.69', key: 'arc_inactive_15d_0_99_hours' },
                { name: '15+d offline · 100–200 h', price: '$2.24', key: 'arc_inactive_15d_100_200_hours' },
                { name: '15+d offline · 200+ h',    price: '$2.89', key: 'arc_inactive_15d_200_plus_hours' }
            ]},
            { label: 'Battlefield 6', variants: [
                { name: 'Random', key: 'battlefield_6' }
            ]},
            { label: 'DayZ', variants: [
                { name: 'Random',          price: '$1.20', key: 'dayz' },
                { name: '500+ h',          price: '$1.69', key: 'dayz_500_hours' },
                { name: '1000+ h',         price: '$2.49', key: 'dayz_1000_hours' },
                { name: '15+d offline',    price: '$1.89', key: 'dayz_inactive' }
            ]},
            { label: 'Escape from Tarkov', variants: [
                { name: 'Random', key: 'escape_from_tarkov' }
            ]}
        ];

        (function () {
            var root    = document.getElementById('root');
            var API     = root.getAttribute('data-api') || '/api/v1/stock';
            var REFRESH = parseInt(root.getAttribute('data-refresh') || '60', 10);
            var COLOR_IN  = getCssVar('--success', '#4ade80');
            var COLOR_OUT = getCssVar('--error', '#fb7185');

            document.getElementById('year').textContent = new Date().getFullYear();

            function getCssVar(name, fallback) {
                var v = getComputedStyle(document.documentElement).getPropertyValue(name);
                return (v && v.trim()) || fallback;
            }

            function esc(s) {
                return String(s).replace(/[&<>"']/g, function (c) {
                    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
                });
            }

            // Look up a key's live count, tolerating case/whitespace differences
            // in the API's key names. Returns null when the API doesn't track the
            // key at all (so callers can fall back instead of showing 0).
            function lookupStock(stock, key) {
                if (Object.prototype.hasOwnProperty.call(stock, key)) return Number(stock[key]) || 0;
                var wanted = String(key).trim().toLowerCase();
                for (var k in stock) {
                    if (Object.prototype.hasOwnProperty.call(stock, k) && k.trim().toLowerCase() === wanted) {
                        return Number(stock[k]) || 0;
                    }
                }
                return null;
            }

            // Resolve a variant's live status from the API stock map.
            // Returns { inStock: bool, label: string }. A key the API doesn't
            // return is treated as 0 (Out of Stock).
            function statusFor(variant, stock) {
                var count = variant.key ? lookupStock(stock, variant.key) : null;
                if (count === null) count = 0;
                return { inStock: count > 0, label: count > 0 ? ('In Stock · ' + count) : 'Out of Stock' };
            }

            function cardHtml(variant, stock) {
                var s     = statusFor(variant, stock);
                var color = s.inStock ? COLOR_IN : COLOR_OUT;
                var price = variant.price
                    ? '<span class="card-price">' + esc(variant.price) + '</span>'
                    : '';
                return ''
                    + '<div class="card">'
                    +   '<div class="card-top">'
                    +     '<div class="card-name">' + esc(variant.name) + '</div>'
                    +     price
                    +   '</div>'
                    +   '<div class="status">'
                    +     '<span class="indicator" style="background-color:' + color + '">'
                    +       '<span class="pulsating" style="background-color:' + color + '"></span>'
                    +     '</span>'
                    +     '<span class="label" style="color:' + color + '">' + esc(s.label) + '</span>'
                    +   '</div>'
                    + '</div>';
            }

            function render(stock) {
                var html = CATALOG.map(function (group) {
                    var inCount = group.variants.filter(function (v) {
                        return statusFor(v, stock).inStock;
                    }).length;
                    return ''
                        + '<section class="group">'
                        +   '<div class="group-head">'
                        +     '<span class="group-title">' + esc(group.label) + '</span>'
                        +     '<span class="group-count">' + inCount + '/' + group.variants.length + ' in stock</span>'
                        +   '</div>'
                        +   '<div class="grid">'
                        +     group.variants.map(function (v) { return cardHtml(v, stock); }).join('')
                        +   '</div>'
                        + '</section>';
                }).join('');

                root.innerHTML = html || '<div class="state">No stock to display.</div>';

                var u = document.getElementById('updated');
                if (u) u.textContent = 'Updated ' + new Date().toLocaleTimeString();
            }

            function load() {
                fetch(API, { headers: { 'Accept': 'application/json' } })
                    .then(function (r) { return r.json(); })
                    .then(function (data) { render((data && data.stock) || {}); })
                    .catch(function () {
                        // Network/API failure — still show the full catalog using
                        // the store's listed availability so the page is never blank.
                        render({});
                    });
            }

            window.load = load;
            load();
            if (REFRESH > 0) setInterval(load, REFRESH * 1000);
        })();
    </script>
</body>
</html>
