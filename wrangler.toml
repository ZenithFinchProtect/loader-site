name = "loader-site"
main = "worker.js"
compatibility_date = "2024-12-01"

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

# Per-IP loader-download cooldown state (see DOWNLOAD_COOLDOWN_SECONDS in worker.js).
[[kv_namespaces]]
binding = "DOWNLOAD_COOLDOWN"
id = "d848694be8c7495183b64b8f7cbd3f1f"

# Per-IP rate limiter for /api/ paths (Workers Rate Limiting API).
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "2001"
simple = { limit = 15, period = 10 }

# Ceilings on NFA-bound traffic so spam can't trip the NFA API's own rate
# limit: a stricter per-IP cap plus a global cap across all visitors.
# Cached stock responses are served before these apply.
[[unsafe.bindings]]
name = "NFA_IP_LIMITER"
type = "ratelimit"
namespace_id = "2002"
simple = { limit = 6, period = 60 }

[[unsafe.bindings]]
name = "NFA_GLOBAL_LIMITER"
type = "ratelimit"
namespace_id = "2003"
simple = { limit = 100, period = 60 }
