name = "loader-site"
main = "worker.js"
compatibility_date = "2024-12-01"

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

# Per-IP rate limiter for /api/ paths (Workers Rate Limiting API).
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "2001"
simple = { limit = 15, period = 10 }
